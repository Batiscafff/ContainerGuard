<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Реєстрація — ContainerGuard</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span class="brand">ContainerGuard</span>
      </div>
      <h2 class="login-title">Реєстрація</h2>

      {% if error %}
        <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/register" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autofocus
                 placeholder="user@example.com"
                 value="{{ email or '' }}" />
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" required
                 placeholder="••••••••" minlength="8" />
        </div>
        <div class="form-group">
          <label for="password2">Підтвердження пароля</label>
          <input type="password" id="password2" name="password2" required
                 placeholder="••••••••" minlength="8" />
        </div>
        <button type="submit" class="btn btn-primary login-btn">Зареєструватись</button>
      </form>

      <p style="text-align:center; margin-top:1rem; font-size:0.875rem; color:var(--text-muted);">
        Вже є акаунт? <a href="/login" style="color:var(--accent);">Увійти</a>
      </p>
    </div>
  </div>
</body>
</html>
